<!DOCTYPE html>
<html>
<head><title>Book Bus</title></head>
<body>
    <h2>Book: {{ bus.name }} ({{ bus.route }})</h2>
    <form method="post">
        Name: <input type="text" name="name" required><br><br>
        Travel Date: <input type="date" name="date" required><br><br>
        Seats: <input type="number" name="seats" min="1" max="{{ bus.seats }}" required><br><br>
        <button type="submit">Book</button>
    </form>
    <br>
    <a href="/buses">Back to Buses</a>
</body>
</html>
