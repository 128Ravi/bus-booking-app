{% extends "layout.html" %}
{% block content %}

<h2>Select Seats - {{ bus.name }}</h2>

<form action="/confirm/{{ bus.id }}" method="POST">
    <input type="hidden" name="date" value="{{ date }}">
    Name: <input type="text" name="name" required><br><br>

    <div class="seat-grid">
        {% for i in range(1, bus.total_seats + 1) %}
            <label>
                <input type="checkbox" name="seats" value="S{{ i }}">
                S{{ i }}
            </label>
        {% endfor %}
    </div>

    <br>
    <button type="submit">Confirm Booking</button>
</form>

{% endblock %}
